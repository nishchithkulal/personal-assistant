services:
  n8n:
    image: n8nio/n8n
    container_name: personal-assistant-n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678
      - GENERIC_TIMEZONE=Asia/Kolkata
    restart: unless-stopped

  discord-bot:
    build: ./discord-bot
    container_name: personal-assistant-bot
    env_file:
      - ./.env
    depends_on:
      - n8n
    restart: unless-stopped